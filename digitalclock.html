<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Clock</title>
</head>
<body>

    <div id="time"></div>
    <div id="date"></div>

    <script>
        setInterval(() => {
            let d = new Date();
            document.getElementById("time").innerHTML = d.toLocaleTimeString();
            document.getElementById("date").innerHTML = d.toLocaleDateString();
        }, 1000);
    </script>

</body>
</html>
<style>
    body {
    background-image: url("https://wallpapercave.com/wp/wp5574222.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
}
    #time {
        font-size: 48px;
        font-weight: bold;
        margin-bottom: 10px;
        text-align: center;
        
        padding: 20px;
        background-color: #f38f8f;
        border-radius: 10px;
        font-family: 'Arial', sans-serif;
    }
    #date {
        font-size: 24px;
        color: gray;
        margin-bottom: 10px;
        padding: 10px;
        background-color: #94cff7;
        text-align: center;
        border-radius: 10px;
    }
