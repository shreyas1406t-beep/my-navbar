<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    background-color: #f0f0f0;
    display:flex;
    justify-content: center;
    align-items:center;
    height:100vh;
}
.calculator
{
    background-color:lightskyblue;
    padding: 36px;
    border-radius: 10px;
    width: 320px;
}
.h2
{
    text-align: center;
    margin-bottom: 16px;
    color: #1a1a2e;
}
input{
   width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      text-align: center;
}
.buttons{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}
button{
    padding: 10px;
    border:none;
    border-radius: 8px;
    background-color: #1a1a2e;
    color:white;
    font-size: 16px;
    cursor:pointer;
}
button:hover{
    background-color: #333;
}
#result {
      color: #e94560;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      margin-top: 20px;
    }

  </style>
    </head>
    <body>
    <div class="calculator">
    <h2>Calculator</h2>
    <input type="number" id="num1" placeholder="enter first num">
    <input type="number"id="num2" placeholder="enter second num">
    <div class="buttons">
        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">-</button>
        <button onclick="calculate('*')">*</button>
        <button onclick="calculate('/')">/</button>

    </div>
    <div id="result">answer = </div>
    <script>
    function calculate(operator){
        const num1 = parseFloat(document.getElementById('num1').value) || 0;
        const num2 = parseFloat(document.getElementById('num2').value) || 0;
        let answer;
        switch(operator){
            case '+':
                answer = num1 + num2;
                break;
            case '-':
                answer = num1 - num2;
                break;
            case '*':
                answer = num1 * num2;
                break;
            case '/':
                answer = num2 !== 0 ? num1 / num2 : 'Error';
                break;
            default:
                answer = 'Error';
        }
        document.getElementById('result').innerText = "Answer: " + answer;
    }
    </script>

</body>
</html>
