<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Cards</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      padding: 32px;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .card {
      background-color: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .card h2 {
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .card p {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="card-container">
    <div class="card">
      <h2>Card 1</h2>
      <p>This is info one.</p>
    </div>
    <div class="card">
      <h2>Card 2</h2>
      <p>This is info two.</p>
    </div>
    <div class="card">
      <h2>Card 3</h2>
      <p>This is info three.</p>
    </div>
    <div class="card">
      <h2>Card 4</h2>
      <p>This is info four.</p>
    </div>
    <div class="card">
      <h2>Card 5</h2>
      <p>This is info five.</p>
    </div>
    <div class="card">
      <h2>Card 6</h2>
      <p>This is info six.</p>
    </div>
  </div>

</body>
</html>
