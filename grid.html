<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #08101e;
            color: #eef2f5;
            padding: 32px;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
        }

        .card {
            background: #11223a;
            padding: 24px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.24);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card h2 {
            color: #f4c06b;
            margin-bottom: 10px;
            font-size: 1.25rem;
        }

        .card p {
            color: #c9d5e1;
            font-size: 14px;
            line-height: 1.75;
        }

        .card:nth-child(odd) {
            background: linear-gradient(180deg, #132241, #0d172d);
        }

        .card:nth-child(even) {
            background: linear-gradient(180deg, #1b2d4a, #112137);
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card">
            <h2>card 1</h2>
            <p>this is sme information of card1</p>
        </div>
        <div class="card">
            <h2> 2nd card</h2>
            <p> this is some info about card 2</p>
        </div>
        <div class="card">
            <h2> card 3</h2>
            <p> this is some info about card 3</p>
        </div>
        <div class="card">
            <h2> card 4</h2>
            <p> this is some info about card 4</p>
        </div>
        <div class="card">
            <h2> card 5</h2>
            <p> this is some info about card 5</p>
        </div>
        <div class="card">
            <h2> card 6</h2>
            <p> this is some info about card 6</p>
        </div>
    </div>
</body>
</html>
