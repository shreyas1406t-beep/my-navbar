<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Navbar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #2c3e50;
      padding: 20px 40px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    .logo {
      color: #ff6b9d;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .logo:hover {
      transform: scale(1.05);
      color: #ffa502;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: #ecf0f1;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      position: relative;
      transition: all 0.3s ease;
    }

    .nav-links a:hover {
      color: #ffa502;
      transform: translateY(-2px);
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background-color: #ffa502;
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after {
      width: 100%;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">Shreyas</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

</body>
</html>
