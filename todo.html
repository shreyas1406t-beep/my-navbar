<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>to-do list</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background-color: #16213e;
      padding: 32px;
      border-radius: 16px;
      width: 400px;
    }

    h2 {
      color: white;
      text-align: center;
      margin-bottom: 20px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #e94560;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #c73652;
    }

    ul {
      list-style: none;
    }

    li {
      background-color: #1a1a2e;
      color: white;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .completed {
  text-decoration: line-through;
  opacity: 0.5;
}
  </style>
</head>
<body>

  <div class="container">
    <h2>My To-Do List</h2>

    <div class="input-area">
      <input type="text" id="taskinput" placeholder="add task.">
      <button onclick="addTask()">add task</button>
    </div>

    <ul id="tasklist"></ul>
  </div>

  <script>
   function addTask(){
    const taskinput = document.getElementById("taskinput")
    const taskText = taskinput.value;
    if (taskText ===""){
        alert("please ener a task");
        return;
    }

    const li = document.createElement("li");
    li.textContent = taskText;

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "❌";
    deleteBtn.onclick = function() {
      if (confirm("are you sure want to delete this task?")) {
        li.remove();
      }
    };
    li.onclick = function() {
  li.classList.toggle("completed");
};

    li.appendChild(deleteBtn);
    document.getElementById("tasklist").appendChild(li);

    taskinput.value = "";
    
}
  </script>

</body>
</html>
